project:
  name: pneumonia-classification
  task: bacteria_virus_classification  # Stage B of the hierarchical approach

data:
  root_dir: data/chest_xray
  train_dir: train
  val_dir: val
  test_dir: test
  image_size: 224
  num_channels: 3
  # Patient-aware stratified validation split (the Kaggle val/ has no virus)
  val_fraction: 0.12
  # Two classes for Stage B

  # NOTE: this is a 2-way softmax (cross-entropy),
  # NOT the binary BCE head used by the NORMAL-vs-PNEUMONIA task, so that it
  # reuses the same class-weight / F1-macro selection machinery
  class_names:
    - BACTERIA
    - VIRUS

preprocessing:
  normalize_mean:
    - 0.485
    - 0.456
    - 0.406
  normalize_std:
    - 0.229
    - 0.224
    - 0.225
  augmentation:
    enabled: true
    horizontal_flip: true
    max_rotation_degrees: 10

training:
  batch_size: 32
  learning_rate: 0.0001
  optimizer: adam
  loss: cross_entropy
  use_class_weights: true
  select_by: f1_macro
  scheduler:
    name: reduce_lr_on_plateau
    factor: 0.5
    patience: 3
  early_stopping:
    enabled: true
    patience: 5
  seeds:
    - 0
    - 1
    - 2

models:
  available:
    - resnet18
    - densenet121
  transfer_learning:
    names:
      - resnet18
      - densenet121
    pretrained: true
    max_epochs: 30
    head_only_epochs: 5

evaluation:
  metrics:
    - accuracy
    - precision_macro
    - recall_macro
    - f1_macro
    - f1_per_class
    - confusion_matrix
    - inference_time

outputs:
  root_dir: results
  checkpoints_dir: results/checkpoints
  metrics_dir: results/metrics
  figures_dir: results/figures
  gradcam_dir: results/gradcam
