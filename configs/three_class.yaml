project:
  name: pneumonia-classification
  task: three_class_classification

data:
  root_dir: data/chest_xray
  train_dir: train
  val_dir: val
  test_dir: test
  image_size: 224
  num_channels: 3
  # Fraction of each training class held out as a stratified validation set
  # The Kaggle val/ folder has only 16 images and no VIRUS, so we resplit
  val_fraction: 0.12
  class_names:
    - NORMAL
    - BACTERIA
    - VIRUS

preprocessing:
  normalize_mean:
    - 0.485
    - 0.456
    - 0.406
  normalize_std:
    - 0.229
    - 0.224
    - 0.225
  augmentation:
    enabled: true
    horizontal_flip: true
    max_rotation_degrees: 10

training:
  batch_size: 32
  learning_rate: 0.0001
  optimizer: adam
  loss: cross_entropy
  # Counter the train imbalance (BACTERIA ~2x NORMAL/VIRUS) with
  # inverse-frequency class weights in the cross-entropy loss
  use_class_weights: true
  # Select the best checkpoint by validation F1-macro rather than loss:
  # F1-macro directly tracks balanced performance on the minority classes
  select_by: f1_macro
  scheduler:
    name: reduce_lr_on_plateau
    factor: 0.5
    patience: 3
  early_stopping:
    enabled: true
    patience: 5
  seeds:
    - 0
    - 1
    - 2

models:
  available:
    - custom_cnn
    - resnet18
    - densenet121
  baseline:
    name: custom_cnn
    max_epochs: 20
  transfer_learning:
    names:
      - resnet18
      - densenet121
    pretrained: true
    max_epochs: 30
    head_only_epochs: 5

evaluation:
  metrics:
    - accuracy
    - precision_macro
    - recall_macro
    - f1_macro
    - f1_per_class
    - confusion_matrix
    - inference_time

outputs:
  root_dir: results
  checkpoints_dir: results/checkpoints
  metrics_dir: results/metrics
  figures_dir: results/figures
  gradcam_dir: results/gradcam
